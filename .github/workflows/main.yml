name: CI-CD Pipeline

on:
  push:
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint with flake8
        run: python -m flake8 app.py tests
      - name: Run tests with coverage
        run: python -m pytest --cov=app --cov-fail-under=80

  docker-test:
    needs: lint-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker test image
        run: docker build --target test -t aceest-gym:test .
      - name: Run tests inside container
        run: docker run --rm aceest-gym:test

  docker-runtime-smoke:
    needs: docker-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker runtime image
        run: docker build --target runtime -t aceest-gym:latest .
      - name: Validate running container
        run: |
          docker run -d --name aceest-test -p 5001:5000 aceest-gym:latest
          sleep 5
          curl -f http://localhost:5001/
      - name: Clean up container
        if: always()
        run: docker rm -f aceest-test || true
